<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NearMyPark Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a') no-repeat center center/cover;
    height: 100vh;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.6);
    color: white;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav-links a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* Center Content */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* Card Layout */
.card {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

/* Box */
.box {
    width: 220px;
    height: 180px;
    background: rgba(255,255,255,0.9);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.box:hover {
    transform: translateY(-5px);
    background: #2a5298;
    color: white;
}

.box h3 {
    margin-bottom: 10px;
}

.btn {
    padding: 8px 15px;
    border: none;
    background: #2a5298;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.box:hover .btn {
    background: white;
    color: #2a5298;
}

/* Bottom Section */
.section {
    display: none;
    background: white;
    padding: 20px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">NearMyPark</div>

    <div class="nav-links">
        <a href="#" onclick="showSection('about')">About Us</a>
        <a href="#" onclick="showSection('contact')">Contact Us</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<!-- SINGLE CENTER DASHBOARD -->
<div class="container">
    <div class="card">

        <div class="box" onclick="goToAddParking()">
            <h3>Add Parking</h3>
            <button class="btn">Add</button>
        </div>

        <div class="box" onclick="goToSearch()">
            <h3>Search Parking</h3>
            <button class="btn">Search</button>
        </div>

        <div class="box" onclick="goToMyParkings()">
            <h3>My Parkings</h3>
            <button class="btn">View</button>
        </div>
        <div class="box" onclick="goToRequests()">
    <h3>📩 My Parking Requests</h3>
    <button class="btn">View</button>
</div>

<div class="box" onclick="goToDriverRequests()">
    <h3>🚗 My Requests status</h3>
    <button class="btn">View</button>
</div>

    </div>
</div>

<!-- About -->
<div id="about" class="section">
    <h3>About Us</h3>
    <p>NearMyPark helps drivers find nearby parking easily and securely.</p>
</div>

<!-- Contact -->
<div id="contact" class="section">
    <h3>Contact Us</h3>
    <p>Email: support@nearmypark.com</p>
    <p>Phone: +91 9876543210</p>
</div>
<!-- my requests -->


<script>

    fetch("http://localhost:8081/api/request/owner/" + userId)
.then(res => res.json())
.then(data => {
    let count = data.filter(r => r.status === "PENDING").length;
    document.getElementById("badge").innerText = count;
});


let userId = localStorage.getItem("userId");

if (!userId) {
    alert("Please login first");
    window.location.href = "login.html";
}

function goToAddParking() {
    window.location.href = "add-parking.html";
}

function goToSearch() {
    window.location.href = "search.html";
}

function goToMyParkings() {
    window.location.href = "my-parkings.html";
}

function logout() {
    alert("Logged out");
    window.location.href = "login.html";
}
function goToRequests() {
    window.location.href = "my-requests.html";
}

function showSection(section) {
    document.getElementById("about").style.display = "none";
    document.getElementById("contact").style.display = "none";

    document.getElementById(section).style.display = "block";
}
function goToDriverRequests() {
    window.location.href = "http://127.0.0.1:5500/my-requests-driver.html";
}
</script>

</body>
</html>
