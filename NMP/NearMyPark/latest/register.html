<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NearMyPark Register</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 380px;
        background: #fff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .title {
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        color: #2a5298;
        margin-bottom: 5px;
    }

    .subtitle {
        text-align: center;
        font-size: 13px;
        color: #777;
        margin-bottom: 20px;
    }

    .input-box {
        margin-bottom: 15px;
    }

    .input-box label {
        font-size: 13px;
        color: #444;
    }

    .input-box input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    .input-box input:focus {
        border-color: #2a5298;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    .row .input-box {
        flex: 1;
    }

    .checkbox {
        font-size: 12px;
        margin-bottom: 15px;
    }

    .checkbox input {
        margin-right: 5px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #2a5298;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #1e3c72;
    }

    .login {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
    }

    .login a {
        color: #2a5298;
        text-decoration: none;
        font-weight: 500;
    }

    .error {
        color: red;
        font-size: 12px;
        margin-top: 5px;
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">NearMyPark</div>
    <div class="subtitle">Create your account</div>

    <!-- Name -->
    <div class="input-box">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name">
    </div>

    <!-- Email -->
    <div class="input-box">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <!-- Mobile -->
    <div class="input-box">
        <label>Mobile Number</label>
        <input type="text" id="mobile" placeholder="Enter mobile number">
    </div>

    <!-- Password Row -->
    <div class="row">
        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password" placeholder="Password">
        </div>

        <div class="input-box">
            <label>Confirm</label>
            <input type="password" id="confirmPassword" placeholder="Confirm">
        </div>
    </div>

    <div id="errorMsg" class="error"></div>

    <!-- Terms -->
    <div class="checkbox">
        <input type="checkbox" id="terms">
        I agree to Terms & Conditions
    </div>

    <button class="btn" onclick="register()">Register</button>

    <div class="login">
        Already registered? <a href="login.html">Login</a>
    </div>
</div>

<script>
function register() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let mobile = document.getElementById("mobile").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let terms = document.getElementById("terms").checked;

    let error = document.getElementById("errorMsg");

    // Validation
    if (!name || !email || !mobile || !password || !confirmPassword) {
        error.innerText = "All fields are required";
        return;
    }

    if (password !== confirmPassword) {
        error.innerText = "Passwords do not match";
        return;
    }

    if (!terms) {
        error.innerText = "Please accept Terms & Conditions";
        return;
    }

    error.innerText = "";

    let data = {
        name: name,
        email: email,
        phone: mobile,
        password: password,
        role: "DRIVER"
    };

    fetch("http://localhost:8081/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(() => {
        alert("Registration Successful");
        window.location.href = "login.html";
    })
    .catch(() => {
        error.innerText = "Registration failed";
    });
}
</script>

</body>
</html>
